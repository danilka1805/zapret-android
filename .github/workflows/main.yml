name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip project
        run: |
          if [ -f zapret-v2.zip ]; then
            unzip zapret-v2.zip
          elif [ -f zapret-android.zip ]; then
            unzip zapret-android.zip
          fi

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build APK
        run: gradle assembleDebug --stacktrace
        working-directory: zapret-v2

      - uses: actions/upload-artifact@v4
        with:
          name: Zapret-v2-debug
          path: zapret-v2/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
